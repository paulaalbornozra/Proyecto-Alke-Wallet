<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Depositar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <a class="navbar-brand" href="menu.html">Alke Wallet</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><span class="nav-link">Bienvenid@</span></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menú Principal</a></li>
                <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
                <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
                <li class="nav-item"><a class="nav-link" href="transactions.html">Últimos Movimientos</a></li>
                <li class="nav-item">
                <li class="nav-item"><a href="login.html" class="btn btn-outline-danger btn-sm">Cerrar sesión</a></li>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Depositar -->
<div class="deposit-container">
    <h2>Depositar</h2>

    <!-- Saldo Actual -->
    <div class="alert alert-info mb-4">
        <strong>Saldo actual:</strong>
        <span id="saldoActual"></span>
    </div>

    <form id="depositForm">

        <div class="mb-3">
            <label class="form-label">Seleccionar Método de depósito</label>
            <select class="form-select" id="depositMethod" required>
                <option value="">Seleccione...</option>
                <option>Transferencia Bancaria</option>
                <option>Tarjeta de Débito</option>
                <option>Cuenta de Ahorro</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Monto a depositar</label>
            <div class="input-group">
                <span class="input-group-text">$</span>
                <input type="number" class="form-control" id="depositAmount" min="1" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">Mensaje (opcional)</label>
            <textarea class="form-control" id="depositDescription" rows="3"></textarea>
        </div>

        <div class="alert alert-danger d-none" id="errorMessage"></div>
        <div class="alert alert-success d-none" id="successMessage"></div>

        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">
                Realizar Depósito
            </button>
            <a href="menu.html" class="btn btn-outline-secondary">
                Menú Principal
            </a>
        </div>

    </form>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/deposit.js"></script>

</body>
</html>
