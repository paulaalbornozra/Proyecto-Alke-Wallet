<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Últimos movimientos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="transactions-page">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="menu.html">Alke Wallet</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><span class="nav-link">Bienvenid@</span></li>
                <li class="nav-item"><a class="nav-link" href="menu.html">Menú Principal</a></li>
                <li class="nav-item"><a class="nav-link" href="deposit.html">Depositar</a></li>
                <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
                <li class="nav-item"><a class="nav-link active" href="transactions.html">Últimos Movimientos</a></li>
                <li class="nav-item">
                    <a href="login.html" class="btn btn-outline-danger btn-sm ms-2">Cerrar sesión</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Movimientos -->
<div class="container-fluid">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <div class="transactions-container">

                <h2 class="text-center mb-4">Últimos Movimientos</h2>

                <!-- FILTRO POR TIPO -->
                <div class="row mb-4">
                    <div class="col-md-6 mx-auto">
                        <label for="filtroTipo" class="form-label fw-bold">Filtrar por tipo:</label>
                        <select id="filtroTipo" class="form-select">
                            <option value="todos">Todos los movimientos</option>
                            <option value="Depósito">Depósitos</option>
                            <option value="Envío">Envíos</option>
                        </select>
                    </div>
                </div>

                <div id="noTransactions" class="alert alert-info text-center d-none">
                    No existen movimientos registrados.
                </div>

                <div class="table-responsive">
                    <table class="table table-striped align-middle">
                        <thead class="table-dark">
                            <tr>
                                <th>Fecha</th>
                                <th>Tipo</th>
                                <th>Descripción</th>
                                <th>Destinatario</th>
                                <th>Monto</th>
                                <th>Saldo</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <!-- JS inserta filas aquí -->
                        </tbody>
                    </table>
                </div>

                <div class="text-center mt-4">
                    <a href="menu.html" class="btn btn-primary">Volver al menú</a>
                </div>

            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/transactions.js"></script>
</body>
</html>
