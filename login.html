<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar Sesión</title>

    <!--Bootstrap CSS-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!--Iniciar sesión-->
    <div class="container login-container">
        <h2>Inicio de Sesión</h2>
        <img src="https://marketplace.canva.com/6AjRw/MAG13X6AjRw/1/tl/canva-contact-person-icon-MAG13X6AjRw.png" width="60" alt="ícono usuario"><br><br>
        <form id="loginForm">
            <div class="row mb-3 align-items-center">
                <label for="Email" class="col-3 col-form-label">Email:</label>
                <div class="col-9">
                <input type="email" class="form-control" id="Email" placeholder="usuario@ejemplo.com">
                </div>
            </div>
            <br>
            <div class="row mb-3 align-items-center">
                <label for="inputPassword" class="col-3 col-form-label">Contraseña:</label>
                <div class="col-9">
                <input type="password" class="form-control" id="inputPassword" placeholder="1234#">
                </div>
            </div>

    <div class="alert alert-danger d-none" id="errorMessage" role="alert"></div>
    <div class="alert alert-success d-none" id="successMessage" role="alert"></div>
    
    <br><button type="submit" class="btn btn-primary">Iniciar Sesión</button>
        </form>
    </div>

    <!--jQuery-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>    
    <!--Bootstrap JS-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="js/login.js"></script>
</body>

</html>
